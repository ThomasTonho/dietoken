name: Dietoken Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run dietoken scan
        run: node dist/cli.js scan --include-user || true
      - name: Run dietoken gain
        run: node dist/cli.js gain || true
