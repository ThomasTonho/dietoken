name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm run bundle
      - name: Commit updated bundle
        run: |
          git config user.name "ThomasTonho"
          git config user.email "antonellithomasv@gmail.com"
          git add dist/dietoken.cjs
          git diff --cached --quiet || git commit -m "chore: update bundle for ${{ github.ref_name }}"
          git push origin HEAD:main
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dietoken.cjs
          generate_release_notes: true
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
